<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHEC Media | Professional Event Media Services</title>

<meta name="description" content="Book CHEC Media for weddings, corporate events, birthdays, and special occasions.">

<meta name="keywords" content="event photography, videography, weddings, media services, Calgary">

<meta name="robots" content="index, follow">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    color:white;
}

.hero{
    min-height:100vh;
    background:
        linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
        url('your-work-photo.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:600px;
    background:rgba(0,0,0,.75);
    padding:40px;
    border-radius:15px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    margin-bottom:25px;
}

input,select,button{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
}

button{
    background:#ffffff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<section class="hero">
<div class="container">

<h1>CHEC Media</h1>

<p>Book your next event with us.</p>

<form action="https://formsubmit.co/info.checmedia@gmail.com" method="POST">

<input type="hidden" name="_subject" value="New Booking Request">

<input type="hidden" name="_captcha" value="false">

<input type="text"
name="Name"
placeholder="Your Name"
required>

<input type="email"
name="Email"
placeholder="Your Email"
required>

<input type="date"
name="Event Date"
required>

<select name="Occasion" required>
<option value="">Select Occasion</option>
<option>Wedding</option>
<option>Birthday</option>
<option>Corporate Event</option>
<option>Graduation</option>
<option>Engagement</option>
<option>Other</option>
</select>

<button type="submit">
Request Booking
</button>

</form>

</div>
</section>

</body>
</html>
